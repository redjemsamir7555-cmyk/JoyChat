<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Privé</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #313338;
            --side: #2b2d31;
            --input: #383a40;
            --text: #dbdee1;
            --primary: #5865f2;
        }

        body, html { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; 
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg); color: var(--text); overflow: hidden;
        }

        .app-container { display: flex; height: 100vh; width: 100vw; }

        /* SIDEBAR */
        .sidebar { 
            width: 260px; background: var(--side); padding: 20px; 
            display: flex; flex-direction: column; gap: 15px; 
            border-right: 1px solid rgba(0,0,0,0.2); 
        }
        .sidebar h2 { margin: 0 0 10px 0; font-size: 1.2em; color: white; }
        .sidebar label { font-size: 0.8em; font-weight: bold; color: #aaa; text-transform: uppercase; }
        
        .sidebar input { 
            width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #444; 
            background: var(--input); color: white; box-sizing: border-box; 
        }

        .btn { 
            padding: 10px; border-radius: 5px; border: none; 
            background: var(--primary); color: white; font-weight: bold; 
            cursor: pointer; transition: 0.2s; 
        }
        .btn:hover { filter: brightness(1.2); }
        .btn-danger { background: #ed4245; margin-top: auto; }

        /* CHAT AREA */
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .chat-header { padding: 15px 20px; background: rgba(0,0,0,0.1); border-bottom: 1px solid rgba(0,0,0,0.1); font-weight: bold; }
        
        #messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        /* Messages */
        .msg { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; border-left: 4px solid var(--primary); }
        .msg .uname { font-weight: bold; margin-right: 8px; }
        .msg .time { font-size: 0.7em; color: #888; }
        .msg .text { margin-top: 5px; word-break: break-word; }
        .msg img { max-width: 100%; max-height: 300px; border-radius: 5px; margin-top: 10px; display: block; }

        /* INPUT BAR */
        .input-wrapper { padding: 20px; background: var(--bg); display: flex; gap: 10px; align-items: center; }
        .chat-input { flex: 1; padding: 12px; border-radius: 5px; border: none; background: var(--input); color: white; outline: none; }
        .upload-btn { background: #4e5058; padding: 10px; border-radius: 5px; cursor: pointer; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <h2>Paramètres</h2>
        
        <label>Pseudo</label>
        <input type="text" id="my-name" value="Utilisateur">
        
        <label>Couleur du nom</label>
        <input type="color" id="my-color" value="#5865f2">

        <button class="btn btn-danger" onclick="adminWipe()">Vider l'historique</button>
    </div>

    <div class="chat-area">
        <div class="chat-header">Discussion Générale</div>
        <div id="messages-container"></div>
        
        <div class="input-wrapper">
            <label class="upload-btn" for="file-upload">📎 Fichier</label>
            <input type="file" id="file-upload" style="display: none;" onchange="uploadFiles()">
            
            <input type="text" id="chat-input" class="chat-input" placeholder="Écrire un message...">
            <button class="btn" onclick="sendText()">Envoyer</button>
        </div>
    </div>
</div>

<script>
    // CONFIGURATION SUPABASE
    const S_URL = 'https://cqxelnijwtjdnczpaggs.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxeGVsbmlqd3RqZG5jenBhZ2dzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwODY4NjIsImV4cCI6MjA5NDY2Mjg2Mn0.LPElYtLB8NGV70_Y4yWCu8xb6SUBz67_Z7DhypQjPEI';
    const sb = supabase.createClient(S_URL, S_KEY);

    const inputField = document.getElementById('chat-input');
    let lastMessageCount = 0;

    // ENVOYER TEXTE
    async function sendText() {
        const val = inputField.value.trim();
        if(!val) return;
        
        const name = document.getElementById('my-name').value || 'Anonyme';
        const color = document.getElementById('my-color').value;

        await sb.from('messages').insert([{ 
            username: name, 
            content: val, 
            color: color, 
            type: 'text' 
        }]);
        
        inputField.value = '';
        fetchData();
    }

    // ENVOYER FICHIER
    async function uploadFiles() {
        const file = document.getElementById('file-upload').files[0];
        if(!file) return;
        
        const name = document.getElementById('my-name').value || 'Anonyme';
        const color = document.getElementById('my-color').value;

        const path = `${Date.now()}_${file.name}`;
        const { data, error } = await sb.storage.from('fichiers').upload(path, file);

        if(data) {
            const url = `${S_URL}/storage/v1/object/public/fichiers/${path}`;
            await sb.from('messages').insert([{ username: name, content: url, color: color, type: 'text' }]);
        }
        fetchData();
    }

    // RÉCUPÉRER MESSAGES
    async function fetchData() {
        const { data } = await sb.from('messages').select('*').order('created_at', { ascending: true });
        if(!data) return;

        if(data.length !== lastMessageCount) {
            const container = document.getElementById('messages-container');
            container.innerHTML = '';

            data.forEach(m => {
                if(m.type === 'text') {
                    const isImage = m.content.match(/\.(jpeg|jpg|gif|png|webp)$/i) || m.content.includes('supabase.co/storage');
                    
                    container.innerHTML += `
                        <div class="msg" style="border-left-color: ${m.color}">
                            <span class="uname" style="color: ${m.color}">${m.username}</span>
                            <span class="time">${new Date(m.created_at).toLocaleTimeString()}</span>
                            <div class="text">
                                ${isImage ? `<img src="${m.content}">` : m.content}
                            </div>
                        </div>
                    `;
                }
            });
            lastMessageCount = data.length;
            container.scrollTop = container.scrollHeight;
        }
    }

    async function adminWipe() {
        if(confirm("Supprimer tous les messages ?")) {
            await sb.from('messages').delete().neq('id', 0);
            fetchData();
        }
    }

    // Touche Entrée pour envoyer
    inputField.addEventListener('keydown', (e) => { if(e.key === 'Enter') sendText(); });

    // Rafraîchissement automatique
    setInterval(fetchData, 2000);
    fetchData();
</script>

</body>
</html>
