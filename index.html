<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoyGang67 // Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0a0a0a; --panel: rgba(15, 15, 15, 0.85); --text: #00ff41; --primary: #00ff41; --accent: #ff003c;
        }
        .light-mode {
            --bg: #e0e0e0; --panel: rgba(255, 255, 255, 0.9); --text: #111; --primary: #2563eb; --accent: #dc2626;
        }
        
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Consolas', monospace; background: var(--bg); color: var(--text); overflow: hidden; transition: 0.3s; }

        #matrix { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; opacity: 0.2; }

        .main-container { display: flex; flex-direction: column; height: 100vh; max-width: 800px; margin: 0 auto; border-left: 1px solid var(--primary); border-right: 1px solid var(--primary); background: var(--panel); backdrop-filter: blur(10px); box-shadow: 0 0 20px rgba(0,0,0,0.5); }

        header { padding: 15px; border-bottom: 1px solid var(--primary); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.4); }
        .btn-theme { cursor: pointer; border: 1px solid var(--primary); background: none; color: var(--primary); padding: 5px 12px; border-radius: 4px; font-weight: bold; }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; scrollbar-width: thin; }
        
        .message { padding: 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); position: relative; animation: slideIn 0.2s ease-out; }
        .message:hover { border-color: var(--primary); }
        .message b { color: var(--primary); font-size: 0.9em; }
        .message img { max-width: 100%; border-radius: 4px; margin-top: 8px; border: 1px solid var(--primary); }
        
        .controls { position: absolute; top: 5px; right: 8px; }
        .controls button { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 11px; margin-left: 5px; opacity: 0.6; }
        .controls button:hover { opacity: 1; text-decoration: underline; }

        .input-bar { padding: 15px; border-top: 1px solid var(--primary); background: rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 10px; }
        .row { display: flex; gap: 8px; }
        input, button { background: rgba(0,0,0,0.3); border: 1px solid var(--primary); color: var(--text); padding: 10px; border-radius: 4px; outline: none; }
        .btn-send { background: var(--primary); color: #000; font-weight: bold; cursor: pointer; flex: 1; transition: 0.2s; }
        .btn-send:hover { background: #fff; box-shadow: 0 0 15px var(--primary); }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="main-container">
    <header>
        <div style="letter-spacing: 3px;">> GOYGANG67_SYSTEM</div>
        <button class="btn-theme" onclick="toggleTheme()">MODE</button>
    </header>

    <div id="chat-window"></div>

    <div class="input-bar">
        <div class="row">
            <input type="text" id="username" placeholder="Pseudo" style="width: 25%;">
            <input type="color" id="msg-color" value="#00ff41" style="width: 45px; height: 38px; padding: 2px;">
            <input type="file" id="img-input" accept="image/*" style="flex: 1; font-size: 0.8em;">
        </div>
        <div class="row">
            <input type="text" id="message-text" placeholder="Entrer message..." style="flex: 3;">
            <button class="btn-send" onclick="sendAll()">ENVOYER</button>
        </div>
    </div>
</div>

<script>
    // --- CONFIGURATION : METS TES VRAIES INFOS ICI ---
    const S_URL = 'https://cqxelnijwtjdnczpaggs.supabase.co'; 
    const S_KEY = 'sb_publishable_R8jL9RZwmNDmv17YOSfKOg_R8rPa03G';
    
    // Initialisation du client (renommé pour éviter l'erreur)
    const supabaseClient = supabase.createClient(S_URL, S_KEY);

    // --- EFFET MATRIX ---
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const letters = "0101010101010101";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);
    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0F0"; ctx.font = fontSize + "px arial";
        drops.forEach((y, i) => {
            const text = letters[Math.floor(Math.random() * letters.length)];
            ctx.fillText(text, i * fontSize, y * fontSize);
            if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(drawMatrix, 50);

    function toggleTheme() { document.body.classList.toggle('light-mode'); }

    // --- FONCTIONS FORUM ---
    async function fetchMessages() {
        const { data, error } = await supabaseClient.from('messages').select('*').order('created_at', { ascending: true });
        if (error) return;

        const win = document.getElementById('chat-window');
        win.innerHTML = '';
        data.forEach(m => {
            const isImage = m.content && m.content.includes('supabase.co/storage/v1/object/public/');
            win.innerHTML += `
                <div class="message" style="border-left: 4px solid ${m.color || 'var(--primary)'}">
                    <div class="controls">
                        <button onclick="editMsg('${m.id}')">EDIT</button>
                        <button onclick="deleteMsg('${m.id}')">DEL</button>
                    </div>
                    <b>${m.username || 'Anonyme'}</b> 
                    <span style="font-size: 10px; opacity:0.4;">${new Date(m.created_at).toLocaleTimeString()}</span>
                    <div style="color: ${m.color || 'inherit'}; margin-top:5px;">
                        ${isImage ? `<img src="${m.content}">` : m.content}
                    </div>
                </div>
            `;
        });
        win.scrollTop = win.scrollHeight;
    }

    async function sendAll() {
        const user = document.getElementById('username').value || 'Anonyme';
        const text = document.getElementById('message-text').value;
        const color = document.getElementById('msg-color').value;
        const file = document.getElementById('img-input').files[0];

        if (!text && !file) return;

        let finalContent = text;

        if (file) {
            const fileName = `${Date.now()}_${file.name}`;
            const { data, error } = await supabaseClient.storage.from('fichiers').upload(fileName, file);
            if (data) {
                finalContent = `${S_URL}/storage/v1/object/public/fichiers/${fileName}`;
            } else {
                console.error("Erreur upload:", error);
            }
        }

        await supabaseClient.from('messages').insert([{ username: user, content: finalContent, color: color }]);
        document.getElementById('message-text').value = '';
        document.getElementById('img-input').value = '';
        fetchMessages();
    }

    async function deleteMsg(id) {
        if(confirm("Supprimer ce message ?")) {
            await supabaseClient.from('messages').delete().eq('id', id);
            fetchMessages();
        }
    }

    async function editMsg(id) {
        const nt = prompt("Modifier le message :");
        if (nt) {
            await supabaseClient.from('messages').update({ content: nt }).eq('id', id);
            fetchMessages();
        }
    }

    setInterval(fetchMessages, 4000);
    fetchMessages();
</script>
</body>
</html>
