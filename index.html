<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Propre & Partage</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #1e1f22;
            --side: #2b2d31;
            --input: #383a40;
            --text: #dbdee1;
            --primary: #5865f2;
        }

        body, html { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; 
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg); color: var(--text); overflow: hidden;
        }

        .app-container { display: flex; height: 100vh; width: 100vw; }

        /* SIDEBAR */
        .sidebar { 
            width: 250px; background: var(--side); padding: 20px; 
            display: flex; flex-direction: column; gap: 15px; 
            border-right: 1px solid rgba(0,0,0,0.2); 
        }
        .sidebar h2 { margin: 0 0 10px 0; font-size: 1.1em; color: white; border-bottom: 1px solid #444; padding-bottom: 10px;}
        .sidebar label { font-size: 0.75em; font-weight: bold; color: #aaa; text-transform: uppercase; }
        
        .sidebar input { 
            width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #444; 
            background: var(--input); color: white; box-sizing: border-box; 
        }

        .btn { 
            padding: 10px; border-radius: 5px; border: none; 
            background: var(--primary); color: white; font-weight: bold; 
            cursor: pointer; transition: 0.2s; 
        }
        .btn:hover { filter: brightness(1.2); }
        .btn-danger { background: #da373c; margin-top: auto; font-size: 0.8em; }

        /* CHAT AREA */
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .chat-header { padding: 15px 20px; background: rgba(0,0,0,0.1); border-bottom: 1px solid rgba(0,0,0,0.1); font-weight: bold; }
        
        #messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        
        /* Messages */
        .msg { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px; border-left: 4px solid var(--primary); max-width: 80%; }
        .msg .meta { margin-bottom: 5px; font-size: 0.9em; }
        .msg .uname { font-weight: bold; }
        .msg .time { font-size: 0.8em; color: #888; margin-left: 8px; }
        .msg .text { word-break: break-word; line-height: 1.4; }

        /* Style spécial pour les fichiers et images */
        .file-link { 
            display: inline-flex; align-items: center; gap: 8px; 
            background: #2b2d31; padding: 10px; border-radius: 5px; 
            border: 1px solid #444; text-decoration: none; color: #5865f2; 
            font-weight: bold; margin-top: 5px;
        }
        .file-link:hover { background: #35373c; }
        .msg img { max-width: 100%; max-height: 350px; border-radius: 5px; margin-top: 10px; display: block; border: 1px solid #444; }

        /* INPUT BAR */
        .input-wrapper { padding: 20px; background: var(--bg); display: flex; gap: 10px; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); }
        .chat-input { flex: 1; padding: 12px; border-radius: 5px; border: none; background: var(--input); color: white; outline: none; }
        .upload-btn { background: #4e5058; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-size: 0.9em; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <h2>Paramètres</h2>
        
        <label>Pseudo</label>
        <input type="text" id="my-name" value="Utilisateur">
        
        <label>Couleur</label>
        <input type="color" id="my-color" value="#5865f2">

        <button class="btn btn-danger" onclick="adminWipe()">Vider l'historique</button>
    </div>

    <div class="chat-area">
        <div class="chat-header"># Général</div>
        <div id="messages-container"></div>
        
        <div class="input-wrapper">
            <label class="upload-btn" for="file-upload">📎</label>
            <input type="file" id="file-upload" style="display: none;" onchange="uploadFiles()">
            
            <input type="text" id="chat-input" class="chat-input" placeholder="Envoyer un message ou un lien...">
            <button class="btn" onclick="sendText()">Envoyer</button>
        </div>
    </div>
</div>

<script>
    // CONFIGURATION SUPABASE
    const S_URL = 'https://cqxelnijwtjdnczpaggs.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxeGVsbmlqd3RqZG5jenBhZ2dzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwODY4NjIsImV4cCI6MjA5NDY2Mjg2Mn0.LPElYtLB8NGV70_Y4yWCu8xb6SUBz67_Z7DhypQjPEI';
    const sb = supabase.createClient(S_URL, S_KEY);

    const inputField = document.getElementById('chat-input');
    let lastMessageCount = 0;

    // ENVOYER TEXTE
    async function sendText() {
        const val = inputField.value.trim();
        if(!val) return;
        
        const name = document.getElementById('my-name').value || 'Anonyme';
        const color = document.getElementById('my-color').value;

        await sb.from('messages').insert([{ username: name, content: val, color: color, type: 'text' }]);
        inputField.value = '';
        fetchData();
    }

    // ENVOYER FICHIER
    async function uploadFiles() {
        const file = document.getElementById('file-upload').files[0];
        if(!file) return;
        
        const name = document.getElementById('my-name').value || 'Anonyme';
        const color = document.getElementById('my-color').value;

        // On garde le nom original pour l'affichage
        const fileName = file.name;
        const filePath = `${Date.now()}_${fileName}`;
        
        const { data, error } = await sb.storage.from('fichiers').upload(filePath, file);

        if(data) {
            const url = `${S_URL}/storage/v1/object/public/fichiers/${filePath}`;
            // On stocke l'URL du fichier
            await sb.from('messages').insert([{ username: name, content: url, color: color, type: 'file' }]);
        } else {
            console.error(error);
            alert("Erreur : Vérifie que tes Policies Storage sont sur 'true'");
        }
        document.getElementById('file-upload').value = ''; // Reset
        fetchData();
    }

    // RÉCUPÉRER MESSAGES
    async function fetchData() {
        const { data } = await sb.from('messages').select('*').order('created_at', { ascending: true });
        if(!data) return;

        if(data.length !== lastMessageCount) {
            const container = document.getElementById('messages-container');
            container.innerHTML = '';

            data.forEach(m => {
                const time = new Date(m.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                let contentHTML = "";

                if(m.type === 'file' || m.content.includes('supabase.co/storage')) {
                    // Verifier si c'est une image
                    const isImage = m.content.match(/\.(jpeg|jpg|gif|png|webp|svg)$/i);
                    if(isImage) {
                        contentHTML = `<img src="${m.content}" alt="Image">`;
                    } else {
                        // C'est un fichier (PDF, ODT, DOCX, etc.)
                        const fileName = m.content.split('_').pop(); // Récupère le nom après le timestamp
                        contentHTML = `
                            <a href="${m.content}" target="_blank" class="file-link">
                                📄 Télécharger : ${decodeURIComponent(fileName)}
                            </a>`;
                    }
                } else {
                    // C'est du texte simple
                    contentHTML = `<div class="text">${m.content}</div>`;
                }
                
                container.innerHTML += `
                    <div class="msg" style="border-left-color: ${m.color}">
                        <div class="meta">
                            <span class="uname" style="color: ${m.color}">${m.username}</span>
                            <span class="time">${time}</span>
                        </div>
                        ${contentHTML}
                    </div>
                `;
            });
            lastMessageCount = data.length;
            container.scrollTop = container.scrollHeight;
        }
    }

    async function adminWipe() {
        if(confirm("Tout supprimer ?")) {
            await sb.from('messages').delete().neq('id', 0);
            fetchData();
        }
    }

    inputField.addEventListener('keydown', (e) => { if(e.key === 'Enter') sendText(); });
    setInterval(fetchData, 2000);
    fetchData();
</script>

</body>
</html>
